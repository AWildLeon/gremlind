# gremlind example configuration (IPv6-native; v4 values are also accepted).

# Control-channel bind address. v6-native / dual-stack.
listen: "[::]:4747"

# Server outer GRE endpoint. v6 by default; an IPv4 address is also valid.
gre_local: "2001:db8::10"

# Inner-address pool handed out to clients (point-to-point pairs).
inner_pool: "fd00:9::/112"
server_inner: "fd00:9::1"

# 0 = negotiate MTU automatically from both peers' outer MTU.
# >0 = hard upper bound on the negotiated tunnel MTU.
mtu: 0

# Use GRE key fields as a demultiplexing identifier (like a port number). Set to
# false for plain GRE without keys. Keys are not an authentication mechanism.
gre_key: true
# GRE sequence numbers add per-packet sequence fields. Usually leave off unless
# both your kernel/path need them; the server's setting wins for clients.
gre_seq: false

# Unix socket for `gremlind status`. Empty string disables it. Default mode is
# private (0600); use 0660 plus a group for shared operator read access.
admin_socket: "/run/gremlind.sock"
admin_socket_mode: "0600"
admin_socket_group: ""

# Optional split-privilege mode: run `gremlind netlinkd -s /run/gremlind-netlink.sock`
# with CAP_NET_ADMIN and point the Internet-facing server at this socket. Then
# the server does not need direct rtnetlink/kernel provisioning privileges.
netlink_socket: ""

# DoS hardening: bound how many connections may be mid-handshake (accepted but
# not yet authenticated) at once — globally and per source IP. Beyond the limit
# new connections are shed immediately. 0 = built-in defaults (256 / 16).
# Authenticated sessions do not count against these.
max_pending_handshakes: 0
max_pending_per_ip: 0

# HTTP decoy: peers that don't speak the control protocol (scanners, browsers)
# get a stock nginx page instead of a hint that gremlind lives here.
# decoy_redirect: when set, reply with a permanent (301) redirect to this URL
# instead of a 404. Use an absolute URL to avoid a redirect loop. Empty = 404.
decoy_redirect: ""
# gremlinmusthide: disable the /imagremlind teapot (418) easter egg so every
# probe gets the plain decoy with no tells. Default false (egg enabled).
gremlinmusthide: false

keepalive_interval: 15s
keepalive_timeout: 45s

# Sticky per-client inner-address leases expire after this time once inactive.
# Set to 0s to keep old leases until daemon restart.
lease_ttl: 24h

auth:
  # Use a high-entropy secret; the HMAC handshake is resistant to passive replay
  # but captured handshakes can still be used for offline guessing of weak PSKs.
  psk: "replace-with-at-least-32-random-bytes"
  # Or per-client secrets. If clients is non-empty it is an allowlist; unlisted
  # client IDs cannot fall back to the global psk.
  # clients:
  #   site-a: "replace-with-random-secret-for-site-a"
  #   site-b: "replace-with-random-secret-for-site-b"

# Optional pppd-style hooks run on interface up/down.
hooks:
  up: ""
  down: ""
