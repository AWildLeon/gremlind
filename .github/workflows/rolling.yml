name: Rolling build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rolling
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build
        run: nix build --no-link --print-build-logs .#default

      - name: Advance rolling branch to tested commit
        run: |
          git push --force origin "HEAD:refs/heads/rolling"
